apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx

spec:
  replicas: 3

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
          # --- Add this volumeMount block ---
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      # --- Add this volumes block ---
      volumes:
      - name: html-volume
        configMap:
          name: nginx-index-html
